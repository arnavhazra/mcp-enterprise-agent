name: Enterprise Agent CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd mcp-enterprise-agent
          npm install

      - name: Build TypeScript code
        run: |
          cd mcp-enterprise-agent
          npm run build
